  - id: P024
    preferred_label: Abnormal fetal spine
    status_note: Ready to submit
    synonyms: []
    definition: |-
      Abnormal fetal spine is defined as any deviation in the alignment, segmentation, curvature, or integrity of the vertebral column identified on prenatal ultrasound. It is assessed in sagittal, coronal, and axial planes, where the spine should appear as a continuous, evenly spaced series of ossification centers with normal curvature.
    pmids:
      - PMID:34723699
    parent: Abnormal fetal skeletal morphology - HP:0025662
    disease_associations: []
    nano_attribution: https://orcid.org/0000-0002-5177-8109
    notes: ""
  - id: P025
    preferred_label: Fetal platyspondyly
    status_note: Ready to Submit
    synonyms:
      - Fetal flattened spinal body
    definition: |-
      Fetal platyspondyly is defined as flattening of the vertebral bodies, in which vertebral body height is reduced relative to the adjacent intervertebral disc space, resulting in a decreased vertebral body height-to-interspace ratio. It is assessed on prenatal ultrasound in a sagittal view of the spine by comparing the height of the vertebral ossification centers to the intervertebral spaces.
    pmids:
      - PMID:2403680
    parent: Abnormal fetal spine
    disease_associations:
      - Spondyloepiphyseal dysplasia congenita - OMIM:183900
      - Kniest dysplasia - OMIM:156550
      - Achondroplasia - OMIM:100800
    nano_attribution: https://orcid.org/0000-0002-5177-8109
    notes: ""
  - id: P026
    preferred_label: Fetal bullet shaped spine
    status_note: Ready to Submit
    synonyms:
      - Fetal anterior wedging of spine
    definition: |-
      Fetal bullet-shaped vertebrae are defined as vertebral bodies with anterior rounding and posterior concavity, creating a characteristic bullet-like profile on lateral view. This morphology is most classically associated with achondroplasia and other FGFR3-related skeletal dysplasias. On prenatal ultrasound, the finding is typically inferred on sagittal views as mild platyspondyly with abnormal vertebral body contour, though it is more clearly appreciated on postnatal radiographs.
    pmids:
      - PMID:2403680
    parent: Abnormal fetal spine
    disease_associations:
      - Achondroplasia - OMIM:100800
      - Thanatophoric dysplasia type I - OMIM:187600
      - Thanatophoric dysplasia type II - OMIM:187601
    nano_attribution: https://orcid.org/0000-0002-5177-8109
    notes: ""
  - id: P027
    preferred_label: Fetal hemivertebrae
    status_note: ready to submit
    synonyms: []
    definition: |-
      Fetal hemivertebrae are congenital vertebral anomalies caused by unilateral failure of vertebral body formation, resulting in a wedge-shaped vertebra. On ultrasound, they are identified by focal spinal angulation or scoliosis on coronal view, disruption of normal alignment on sagittal view, and asymmetric or absent ossification centers on axial view.
    pmids:
      - PMID:39978942
      - PMID:15692206
    parent: Abnormal fetal spine
    disease_associations:
      - Spondylocostal dysostosis - OMIM:277300
      - Klippel-Feil syndrome - OMIM:118100
    nano_attribution: https://orcid.org/0000-0002-5177-8109
    notes: ""
  - id: P028
    preferred_label: Fetal long bone bowing
    status_note: ready to submit
    synonyms:
      - Fetal bone bowing
    definition: |-
      Long bone bowing is defined as abnormal curvature or angulation of the diaphysis of one or more long bones, most commonly the femur and tibia. It is assessed on prenatal ultrasound in sagittal views, where the long bones should appear straight and symmetric bilaterally. Evaluation of the extremities should include assessment for bowing, fractures, ossification, and symmetry.
    pmids:
      - PMID:17486589
    parent: Abnormal fetal skeletal morphology - HP:0025662
    disease_associations:
      - Achondroplasia - OMIM:100800
      - Thanatophoric dysplasia type I - OMIM:187600
      - Campomelic dysplasia - OMIM:114290
      - Osteogenesis imperfecta - OMIM:166200
    nano_attribution: https://orcid.org/0000-0002-5177-8109
    notes: ""
  - id: P029
    preferred_label: Fetal long bone epiphyseal abnormality
    status_note: Ready to submit
    synonyms:
      - Abnormal fetal epiphyses
    definition: |-
      Fetal long bone epiphyseal abnormality is defined as abnormal size, shape, timing, or ossification of the secondary ossification centers at the ends of long bones. On ultrasound, these epiphyses normally appear as echogenic, egg-shaped foci in a gestational age-dependent sequence but may be delayed, absent, irregular, or enlarged when abnormal. These findings may indicate skeletal dysplasia or disordered endochondral ossification.
    pmids:
      - PMID:6726877
    parent: Abnormal fetal skeletal morphology - HP:0025662
    disease_associations:
      - Multiple epiphyseal dysplasia, dominant - OMIM:132400
      - Multiple epiphyseal dysplasia, recessive - OMIM:226900
      - Spondyloepiphyseal dysplasia congenita - OMIM:183900
      - Achondroplasia - OMIM:100800
      - Spondyloepimetaphyseal dysplasia - OMIM:271700
      - Thanatophoric dysplasia type I - OMIM:187600
      - Thanatophoric dysplasia type II - OMIM:187601
    nano_attribution: https://orcid.org/0000-0002-5177-8109
    notes: ""
  - id: P030
    preferred_label: Fetal long bone metaphyseal abnormality
    status_note: Ready to submit
    synonyms:
      - Abnormal fetal metaphyses
    definition: |-
      Fetal long bone metaphyseal abnormality is defined as abnormal size, shape, contour, or mineralization of the metaphysis, the region between the diaphysis and epiphysis of a long bone. On ultrasound, the metaphysis may appear flared, widened, irregular, cupped, or poorly ossified. These findings reflect abnormal endochondral bone formation and are commonly associated with skeletal dysplasias.
    pmids:
      - PMID:37351952
      - PMID:19265753
    parent: Abnormal fetal skeletal morphology - HP:0025662
    disease_associations:
      - Schmid metaphyseal chondrodysplasia - OMIM:156500
      - Jansen metaphyseal chondrodysplasia - OMIM:156400
      - Gaucher disease - OMIM:230800
      - Craniometaphyseal dysplasia - OMIM:123000
      - Achondroplasia - OMIM:100800
      - Spondyloepimetaphyseal dysplasia - OMIM:271700
      - Thanatophoric dysplasia type I - OMIM:187600
      - Thanatophoric dysplasia type II - OMIM:187601
    nano_attribution: https://orcid.org/0000-0002-5177-8109
    notes: ""
  - id: P031
    preferred_label: Fetal metaphyseal flaring
    status_note: ready to submit
    synonyms:
      - Erlenmeyer flask deformity
    definition: |-
      Fetal metaphyseal flaring, also known as an Erlenmeyer flask deformity, is defined as abnormal widening or splaying of the metaphyses, which are the transitional zones between the diaphysis and epiphysis. This results in a disproportionately broad bone end relative to the diaphyseal width on prenatal ultrasound.
    pmids:
      - PMID:19444897
    parent: Fetal long bone metaphyseal abnormality
    disease_associations:
      - Gaucher disease - OMIM:230800
      - Craniometaphyseal dysplasia - OMIM:123000
      - Achondroplasia - OMIM:100800
    nano_attribution: https://orcid.org/0000-0002-5177-8109
    notes: ""
  - id: P032
    preferred_label: Abnormal fetal metaphyseal-diaphyseal angle
    status_note: ready to submit
    synonyms: []
    definition: |-
      An abnormal (increased) fetal metaphyseal-diaphyseal angle is defined as a value greater than or equal to 125 degrees, compared with a normal angle of approximately 95 degrees, and is suggestive of achondroplasia. This angle is measured on ultrasound at the proximal femur or humerus by assessing the junction between the metaphysis and diaphysis, with the long axis of the diaphysis and the contour of the metaphysis used to define the angle. An increased angle reflects abnormal bone modeling and widening at the metaphyseal-diaphyseal junction, a characteristic feature of achondroplasia.
    pmids:
      - PMID:26450406
    parent: Fetal long bone metaphyseal abnormality
    disease_associations:
      - Achondroplasia - OMIM:100800
    nano_attribution: https://orcid.org/0000-0002-5177-8109
    notes: ""
  - id: P033
    preferred_label: Fetal collar hoop sign
    status_note: ready to submit
    synonyms: []
    definition: |-
      The fetal collar hoop sign is an imaging finding characterized by abnormal morphology at the proximal femur, in which the metaphysis appears rounded with poor or irregular ossification and an abnormal, widened transition to the diaphysis. This configuration is associated with relative periosteal overgrowth, creating a collar- or hoop-like appearance surrounding the metaphyseal-diaphyseal junction. On ultrasound, it is identified as a rounded metaphyseal-epiphyseal interface with a broader-than-expected angle of connection to the diaphysis, reflecting disorganized ossification and abnormal bone modeling.
    pmids:
      - PMID:19399756
    parent: Fetal long bone metaphyseal abnormality
    disease_associations:
      - Achondroplasia - OMIM:100800
    nano_attribution: https://orcid.org/0000-0002-5177-8109
    notes: ""
  - id: P034
    preferred_label: Fetal rhizomelia
    status_note: ready to submit
    synonyms: []
    definition: |-
      Fetal rhizomelia is defined as disproportionate shortening of the proximal segments of the limbs, particularly the humerus and femur, relative to gestational age. It is assessed on prenatal ultrasound by measuring long bone lengths and comparing them to expected norms, with the proximal segments appearing more shortened than the distal segments.
    pmids:
      - PMID:37675393
    parent: Abnormal fetal skeletal morphology - HP:0025662
    disease_associations:
      - Achondroplasia - OMIM:100800
      - Thanatophoric dysplasia type I - OMIM:187600
      - Thanatophoric dysplasia type II - OMIM:187601
      - Rhizomelic chondrodysplasia punctata type 1 - OMIM:215100
    nano_attribution: https://orcid.org/0000-0002-5177-8109
    notes: ""
  - id: P035
    preferred_label: Fetal mesomelia
    status_note: ready to submit
    synonyms: []
    definition: |-
      Fetal mesomelia is defined as disproportionate shortening of the middle segments of the limbs (radius/ulna and tibia/fibula) relative to the proximal and distal segments. It is assessed on ultrasound by comparing segmental long bone measurements and is characteristic of certain skeletal dysplasias.
    pmids:
      - PMID:37675393
    parent: Abnormal fetal skeletal morphology - HP:0025662
    disease_associations:
      - Langer mesomelic dysplasia - OMIM:249700
      - Ellis-van Creveld syndrome - OMIM:225500
    nano_attribution: https://orcid.org/0000-0002-5177-8109
    notes: ""
  - id: P036
    preferred_label: Fetal acromelia
    status_note: ready to submit
    synonyms: []
    definition: |-
      Fetal acromelia is defined as disproportionate shortening of the distal segments of the limbs (hands and feet) relative to the more proximal segments. On ultrasound, this appears as relatively small hands and feet compared to overall limb length and gestational age.
    pmids:
      - PMID:37675393
    parent: Abnormal fetal skeletal morphology - HP:0025662
    disease_associations:
      - Acromelic frontonasal dysostosis - OMIM:603671
      - Greig cephalopolysyndactyly syndrome - OMIM:175700
      - Brachydactyly type E - OMIM:113300
    nano_attribution: https://orcid.org/0000-0002-5177-8109
    notes: ""
  - id: P037
    preferred_label: Fetal micromelia
    status_note: ready to submit
    synonyms: []
    definition: |-
      Fetal micromelia is defined as severe, generalized shortening of all segments of the limbs (proximal, middle, and distal) relative to gestational age. It is assessed on ultrasound by markedly reduced long bone measurements across all segments and is often associated with severe skeletal dysplasias.
    pmids:
      - PMID:37675393
    parent: Abnormal fetal skeletal morphology - HP:0025662
    disease_associations:
      - Thanatophoric dysplasia type I - OMIM:187600
      - Thanatophoric dysplasia type II - OMIM:187601
      - Osteogenesis imperfecta - OMIM:166200
      - Osteogenesis imperfecta type II - OMIM:166210
      - Achondrogenesis type IA - OMIM:200600
      - Achondrogenesis type IB - OMIM:600972
      - Achondrogenesis type II - OMIM:200610
      - Campomelic dysplasia - OMIM:114290
    nano_attribution: https://orcid.org/0000-0002-5177-8109
    notes: ""
  - id: P038
    preferred_label: Abnormal fetal hands
    status_note: ready to submit
    synonyms: []
    definition: |-
      Abnormal fetal hands are defined as deviations in the size, shape, position, or digit number of the hands identified on prenatal ultrasound. Findings may include polydactyly, syndactyly, clenched hands, overlapping digits, abnormal positioning, or disproportionately small or large hands for gestational age. Abnormalities may be isolated or associated with chromosomal, genetic, or skeletal disorders.
    pmids:
      - PMID:36526543
    parent: Abnormal fetal skeletal morphology - HP:0025662
    disease_associations:
      - Achondroplasia - OMIM:100800
    nano_attribution: https://orcid.org/0000-0002-5177-8109
    notes: ""
  - id: P039
    preferred_label: Fetal brachydactyly
    status_note: ready to submit
    synonyms:
      - Fetal trident hands
    definition: |-
      Fetal brachydactyly is defined as abnormal shortening of the digits (phalanges), resulting in fingers or toes that are shorter than expected for gestational age. On prenatal ultrasound, it is identified by disproportionately short digits relative to the hand or foot, often with otherwise normal long bone lengths.
    pmids:
      - PMID:36526543
    parent: Abnormal fetal hands
    disease_associations:
      - Achondroplasia - OMIM:100800
    nano_attribution: https://orcid.org/0000-0002-5177-8109
    notes: ""
  - id: P040
    preferred_label: Fetal hitchhiker thumbs
    status_note: ready for submit
    synonyms: []
    definition: |-
      Fetal hitchhiker thumbs are defined as abnormally positioned thumbs that are persistently held in a hyperextended and abducted posture on prenatal ultrasound. This finding is assessed in real-time imaging and is characterized by limited flexion and a fixed, exaggerated extension of the thumb relative to the palm. It is classically associated with diastrophic dysplasia and related skeletal dysplasias.
    pmids:
      - PMID:12901408
    parent: Abnormal fetal hands
    disease_associations:
      - Diastrophic dysplasia - OMIM:222600
    nano_attribution: https://orcid.org/0000-0002-5177-8109
    notes: Collaborator label had duplicate word: Fetal fetal hitchhiker thumbs.
  - id: P041
    preferred_label: Fetal temporal lobe malformation
    status_note: ready to submit
    synonyms:
      - Fetal temporal lobe dysgenesis
      - fetal temporal lobe abnormal folding
      - fetal abnormal temporal lobe gyration
    definition: |-
      Fetal temporal lobe malformation is defined as abnormal development, structure, or organization of the temporal lobes identified on prenatal imaging. It is assessed on ultrasound or fetal MRI, where findings may include asymmetry, abnormal size or contour, disrupted sulcation, or atypical signal characteristics. These abnormalities reflect altered cortical development and may be associated with genetic conditions, brain malformations, or neurodevelopmental disorders.
    pmids:
      - PMID:24616001
      - PMID:29170271
    parent: Abnormal fetal central nervous system morphology - HP:0034206
    disease_associations:
      - Achondroplasia - OMIM:100800
      - Hypochondroplasia - OMIM:146000
      - Thanatophoric dysplasia type I - OMIM:187600
      - Thanatophoric dysplasia type II - OMIM:187601
      - Muenke syndrome - OMIM:602849
    nano_attribution: https://orcid.org/0000-0002-5177-8109
    notes: ""
