    notes: Collaborator was not sure whether this lives under skeletal, cardiac, or pulmonary.
  - id: P014
    preferred_label: Fetal frontal bossing
    status_note: READY TO SUBMIT
    synonyms: []
    definition: |-
      Fetal frontal bossing is defined as abnormal prominence or protrusion of the frontal bone, assessed on the midsagittal profile view of the fetal face on ultrasound. It is typically identified by subjective evaluation on 2D ultrasound, characterized by an exaggerated convexity or bulging of the frontal contour relative to the expected fetal profile.
    pmids:
      - PMID:9315184
    parent: Fetal head anomaly - HP:0034245
    disease_associations:
      - Achondroplasia - OMIM:100800
      - Hypochondroplasia - OMIM:146000
      - Thanatophoric dysplasia type I - OMIM:187600
      - Thanatophoric dysplasia type II - OMIM:187601
    nano_attribution: https://orcid.org/0000-0002-5177-8109
    notes: ""
  - id: P015
    preferred_label: Fetal craniosynostosis
    status_note: Ready to Submit
    synonyms: []
    definition: |-
      Fetal craniosynostosis is defined as the premature fusion of one or more cranial sutures in utero, resulting in abnormal skull growth and head shape. It is assessed on prenatal ultrasound by evaluating the contour of the fetal skull and sutures, with findings that may include abnormal head shape.
    pmids:
      - PMID:35998125
    parent: Fetal head anomaly - HP:0034245
    disease_associations:
      - Thanatophoric dysplasia type II - OMIM:187601
    nano_attribution: https://orcid.org/0000-0002-5177-8109
    notes: ""
  - id: P016
    preferred_label: Fetal brachycephaly
    status_note: Ready to Submit
    synonyms: []
    definition: |-
      Fetal brachycephaly is defined as an abnormally rounded or shortened skull shape in which the biparietal diameter is disproportionately increased relative to the occipitofrontal diameter, resulting in an elevated cephalic index. The cephalic index is calculated as BPD/OFD multiplied by 100 and is assessed on ultrasound in an axial plane of the fetal head at the level of the thalami and cavum septi pellucidi. Brachycephaly is typically defined as a cephalic index greater than or equal to 83-85, with gestational age-specific norms applied. This finding may represent a normal variant but can also be associated with craniosynostosis, particularly bicoronal synostosis, chromosomal abnormalities such as trisomy 21, skeletal dysplasias, or extrinsic compressive forces.
    pmids:
      - PMID:2677864
      - PMID:11772173
    parent: Fetal craniosynostosis
    disease_associations:
      - Muenke syndrome - OMIM:602849
      - Saethre-Chotzen syndrome - OMIM:101400
    nano_attribution: https://orcid.org/0000-0002-5177-8109
    notes: ""
  - id: P017
    preferred_label: Fetal dolichocephaly
    status_note: Ready to Submit
    synonyms: []
    definition: |-
      Fetal dolichocephaly is defined as an elongated skull shape in which the occipitofrontal diameter is disproportionately increased relative to the biparietal diameter, resulting in a decreased cephalic index less than 74. The cephalic index is calculated as BPD/OFD multiplied by 100 on an axial ultrasound view at the level of the thalami and cavum septi pellucidi. It is most commonly due to positional factors with patent sutures and absence of frontal bossing.
    pmids:
      - PMID:6787895
    parent: Fetal craniosynostosis
    disease_associations: []
    nano_attribution: https://orcid.org/0000-0002-5177-8109
    notes: ""
  - id: P018
    preferred_label: Fetal trigonocephaly
    status_note: Already Exists; HP:4000142
    synonyms: []
    definition: |-
      A fetal ultrasound finding defined by flattening of the occiput with pointing of the frontal bones and brachycephaly with an increased cephalic index. It is characterized by keel shaped deformity of forehead with midline ridge, bilateral fronto temporal constriction with compensatory biparietal expansion, supra orbital and lateral orbital retrusion and hypotelorism. This finding is said to resemble a strawberry.
    pmids: []
    parent: Fetal skeletal abnormality
    disease_associations:
      - Hypophosphatasia - OMIM:241500
      - Osteoglophonic dysplasia - OMIM:166250
      - Campomelic dysplasia - OMIM:114290
    nano_attribution: https://orcid.org/0000-0002-5177-8109
    notes: Existing term has no disease associations; collaborator proposes adding listed associations.
  - id: P019
    preferred_label: Fetal scaphocephaly
    status_note: Ready to Submit
    synonyms: []
    definition: |-
      Fetal scaphocephaly is defined as an elongated, narrow skull shape caused by premature fusion of the sagittal suture. It is characterized by anteroposterior elongation with biparietal narrowing, resulting in a decreased cephalic index, and is assessed on ultrasound in axial and sagittal views of the fetal head. Unlike dolichocephaly, cranial sutures are fused rather than patent, and frontal and occipital bossing are often present and may become more pronounced over time.
    pmids:
      - PMID:28553772
      - PMID:32868470
    parent: Fetal craniosynostosis
    disease_associations:
      - Thanatophoric dysplasia type II - OMIM:187601
      - Antley-Bixler syndrome - OMIM:207410
    nano_attribution: https://orcid.org/0000-0002-5177-8109
    notes: ""
  - id: P020
    preferred_label: Fetal cloverleaf skull
    status_note: Ready to Submit
    synonyms:
      - Fetal kleeblattschadel
    definition: |-
      Fetal cloverleaf skull (Kleeblattschadel) is defined as a severe form of multisuture craniosynostosis resulting in a characteristic trilobar skull shape. It is caused by premature fusion of multiple cranial sutures, most commonly the coronal and lambdoid sutures, with compensatory expansion through remaining patent regions. On prenatal ultrasound, it is identified by a distinctive trilobed cranial contour on axial views, with three bulging regions (two temporal and one frontal/superior), often accompanied by turricephaly, abnormal head biometry, ventriculomegaly, and marked proptosis. This finding reflects severe disruption of normal skull growth and is associated with significant morbidity.
    pmids:
      - PMID:7346817
    parent: Fetal craniosynostosis
    disease_associations:
      - Thanatophoric dysplasia type II - OMIM:187601
      - Pfeiffer syndrome - OMIM:101600
      - Crouzon syndrome - OMIM:123500
      - Apert syndrome - OMIM:101200
      - Carpenter syndrome - OMIM:201000
    nano_attribution: https://orcid.org/0000-0002-5177-8109
    notes: ""
  - id: P021
    preferred_label: Abnormal fetal ribs
    status_note: Ready to submit
    synonyms: []
    definition: |-
      Abnormal fetal ribs are defined as deviations in the number, size, shape, or configuration of the ribs identified on prenatal ultrasound. These abnormalities may include shortened ribs, absent or supernumerary ribs, irregular contour, fractures, or abnormal spacing. The ribs are assessed on axial and coronal views of the fetal thorax, where they should appear as symmetric, evenly spaced echogenic arcs encircling the chest. Abnormal rib findings often reflect underlying skeletal dysplasias or thoracic restriction and may contribute to a small thoracic cage and risk of pulmonary hypoplasia.
    pmids:
      - PMID:40952954
    parent: Abnormal fetal skeletal morphology - HP:0025662
    disease_associations: []
    nano_attribution: https://orcid.org/0000-0002-5177-8109
    notes: ""
  - id: P022
    preferred_label: Decreased fetal rib length
    status_note: Ready to submit
    synonyms:
      - Short fetal ribs
    definition: |-
      Decreased fetal rib length is defined as ribs that are shorter than expected for gestational age, typically below the 5th percentile or associated with a disproportionately small thorax. It is assessed on ultrasound in axial views of the chest, though surrogate measures such as thoracic circumference are often used. This finding is a key marker of skeletal dysplasia and is associated with pulmonary hypoplasia and increased risk of perinatal lethality.
    pmids:
      - PMID:8705412
    parent: Abnormal fetal ribs
    disease_associations:
      - Short-rib thoracic dysplasia (Jeune syndrome) - OMIM:208500
      - Ellis-van Creveld syndrome - OMIM:225500
    nano_attribution: https://orcid.org/0000-0002-5177-8109
    notes: ""
  - id: P023
    preferred_label: Fetal rib fractures
    status_note: Ready to submit
    synonyms:
      - Fetal rib beading
    definition: |-
      Fetal rib fractures are defined as disruptions of the normal continuity of the rib cortex identified on prenatal ultrasound. They appear as discontinuities, angulations, or areas of callus formation along the rib shafts. Rib beading refers to a related finding characterized by a rosary bead or string of pearls appearance, reflecting multiple healing fractures or callus formation at regular intervals. These findings are most commonly associated with disorders of bone fragility, such as osteogenesis imperfecta.
    pmids:
      - PMID:3293447
    parent: Abnormal fetal ribs
    disease_associations:
      - Osteogenesis imperfecta - OMIM:166200
      - Osteogenesis imperfecta type II - OMIM:166210
      - Achondrogenesis type IA - OMIM:200600
