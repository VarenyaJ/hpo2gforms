  - id: P003
    preferred_label: Abnormal fetal humerus length
    status_note: Existing term: short fetal humerus length; HP:0011429
    synonyms:
      - Abnormal fetal HL
    definition: |-
      A short humerus length is defined as a length below the 2.5th percentile for gestational age or as a measurement less than 0.9 of that predicted by the measured biparietal diameter. The humerus should be measured with the bone perpendicular to the ultrasound beam and with epiphyseal cartilages visible but not included in the measurement.
    pmids:
      - PMID:16100637
    parent: ""
    disease_associations:
