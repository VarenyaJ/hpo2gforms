  - id: P009
    preferred_label: Reduced fetal femur/foot length ratio
    status_note: Already exists as Reduced fetal femur/foot length ratio; HP:0025663
    synonyms:
      - Decreased fetal femur:foot ratio
    definition: |-
      This ratio relates the length of the fetal femur to that of the fetal foot. The ratio is approximately 1 throughout the age range of 14 to 40 weeks of gestation. A substantial reduction in the ratio can help differentiate fetuses that have dysplastic limb reduction from those whose limbs are short because of constitutional factors or IUGR. It can reduce the problem of an unknown gestational age and help to distinguish between fetal skeletal dysplasia and intrauterine growth retardation caused by other factors.
    pmids:
      - PMID:36575575
    parent: ""
    disease_associations: []
    nano_attribution: https://orcid.org/0000-0002-5177-8109
    notes: "Addendum to existing term: A ratio <0.89 is concerning for a more severe or potentially life-limiting skeletal dysplasia. PMID:36575575"
  - id: P010
    preferred_label: Champagne Cork Sign
    status_note: ALREADY EXISTS; HP:0034226
    synonyms: []
    definition: |-
      Characteristic appearance of the chest and abdomen in the sagittal view on prenatal ultrasound when the chest is small and the abdomen protruding.
    pmids: []
    parent: Decreased fetal thoracic circumference:abdominal circumference ratio
    disease_associations: []
    nano_attribution: https://orcid.org/0000-0002-5177-8109
    notes: Existing HPO term at https://hpo.jax.org/browse/term/HP:0034226. Listed as a child term under decreased fetal thoracic circumference:abdominal circumference ratio in the source notes.
  - id: P011
    preferred_label: Decreased fetal femur length:biparietal diameter ratio
    status_note: READY TO SUBMIT
    synonyms:
      - Decreased fetal FL:BPD ratio
    definition: |-
      An abnormal (decreased) fetal femur length-to-biparietal diameter (FL/BPD) ratio is defined as a value less than 0.376, which is associated with a significantly increased likelihood of skeletal dysplasia. The femur length is measured from the outer border of one end of the ossified femoral diaphysis to the other, excluding the epiphyses and artifact, while the biparietal diameter is measured on ultrasound at the level of the thalami and cavum septi pellucidi, using an outer-to-inner technique. This ratio reflects limb shortening relative to head size and serves as a screening marker for skeletal dysplasia.
    pmids:
      - PMID:36575575
    parent: Abnormal fetal skeletal morphology - HP:0025662
    disease_associations: []
    nano_attribution: https://orcid.org/0000-0002-5177-8109
    notes: ""
  - id: P012
    preferred_label: Decreased fetal thoracic circumference:abdominal circumference ratio
    status_note: READY TO SUBMIT
    synonyms:
      - Decreased fetal TC:AC ratio
    definition: |-
      An abnormal (decreased) fetal thoracic circumference-to-abdominal circumference (TC/AC) ratio is defined as a value less than 0.6, which is concerning for a disproportionately narrow thorax. The thoracic circumference is measured on ultrasound in a transverse view at the level of the four-chamber cardiac view by tracing the outer skin line of the chest wall, while the abdominal circumference is obtained in a transverse plane at the level of the stomach, umbilical vein, and portal sinus, also using the outer skin line. This ratio reflects thoracic size relative to overall fetal size, with decreased values indicating severe thoracic restriction, which can be associated with severe and life-limiting skeletal dysplasias.
    pmids:
      - PMID:39078648
    parent: Abnormal fetal skeletal morphology
    disease_associations:
      - Thanatophoric dysplasia type I - OMIM:187600
      - Thanatophoric dysplasia type II - OMIM:187601
