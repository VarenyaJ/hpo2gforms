  - id: P008
    preferred_label: Decreased fetal femur length:abdominal circumference ratio
    status_note: READY TO SUBMIT
    synonyms:
      - Decreased fetal FL:AC ratio
    definition: |-
      An abnormal (decreased) fetal femur length-to-abdominal circumference (FL/AC) ratio is defined as a value less than 0.16, which is concerning for a life-limiting skeletal dysplasia. The femur length is measured from the outer border of one end of the ossified femoral diaphysis to the other, excluding the epiphyses and artifact, while the abdominal circumference is obtained in a transverse view by tracing the outer skin line at the level where the stomach, umbilical vein, and portal sinus are visualized. The FL/AC ratio reflects the degree of limb shortening relative to fetal size and has been shown to be one of the best-performing predictors of lethality, outperforming femur length alone and other proportional indices; however, it reflects severity rather than diagnosis.
    pmids:
      - PMID:9369835
      - PMID:39078648
    parent: Abnormal fetal skeletal morphology - HP:0025662
    disease_associations:
      - Thanatophoric dysplasia type I - OMIM:187600
      - Thanatophoric dysplasia type II - OMIM:187601
      - Achondrogenesis type IA - OMIM:200600
      - Achondrogenesis type IB - OMIM:600972
