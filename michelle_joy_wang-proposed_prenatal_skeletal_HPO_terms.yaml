  - id: P002
    preferred_label: Abnormal fetal thoracic circumference
    status_note: Ready to SUBMIT
    synonyms:
      - Abnormal fetal TC
      - decreased TC
    definition: |-
      An abnormal (reduced) fetal thoracic circumference is defined as a measurement below the 2.5th or 5th percentile for gestational age. The thoracic circumference is assessed on a transverse (axial) view of the fetal thorax at the level of the four-chamber cardiac view. This is performed by obtaining a true axial plane in which the four cardiac chambers are clearly visualized, with the spine posteriorly and the ribs seen circumferentially, typically just above the diaphragm where the heart occupies approximately one-third of the thoracic area. The outer contour of the chest wall (skin line) is then traced to obtain the circumference measurement.
    pmids:
      - PMID:3555087
      - PMID:10419608
    parent: |-
      Abnormal fetal morphology - HP:0034058
      Abnormal fetal skeletal morphology - HP:0025662
    disease_associations:
