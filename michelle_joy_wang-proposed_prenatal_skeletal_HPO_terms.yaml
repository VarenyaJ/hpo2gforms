  - id: P004
    preferred_label: Abnormal fetal scapula length
    status_note: READY TO SUBMIT
    synonyms:
      - Abnormal fetal scapula
      - hypoplastic fetal scapula
    definition: |-
      An abnormal (short) scapula length is defined as a measurement below the 5th percentile for gestational age or as a value greater than or equal to 3 standard deviations below the mean. The scapula is assessed by measuring the maximal distance from the acromion to the inferior angle. This is performed by first identifying the fetal spine in a longitudinal plane, then sweeping the transducer parallel and laterally, with gentle angulation as needed, until both landmarks are clearly visualized. Digital sonographic calipers are then placed at the acromion and inferior angle to obtain the measurement.
    pmids:
      - PMID:2695411
      - PMID:7933014
    parent: Abnormal fetal skeletal morphology
    disease_associations:
      - Campomelic dysplasia - OMIM:114290
    nano_attribution: https://orcid.org/0000-0002-5177-8109
    notes: ""
  - id: P005
    preferred_label: Abnormal fetal clavicle length
    status_note: READY TO SUBMIT
    synonyms:
      - Abnormal fetal clavicle length
      - hypoplastic fetal clavicle
    definition: |-
      An abnormal (short) clavicle length is defined as a measurement below the 5th percentile for gestational age or as a value greater than or equal to 3 standard deviations below the mean. The clavicle is assessed by measuring the maximal distance between its medial and lateral ends. This is performed by obtaining an axial sonographic view just cephalad to the level of the thoracic inlet, where the clavicular curvature and configuration are clearly visualized. Calipers are then placed at the medial and lateral aspects of the clavicle to obtain the measurement.
    pmids:
      - PMID:3903198
      - PMID:16450360
    parent: Abnormal fetal skeletal morphology
    disease_associations:
      - Cleidocranial dysplasia - OMIM:119600
    nano_attribution: https://orcid.org/0000-0002-5177-8109
    notes: ""
  - id: P006
    preferred_label: Abnormal fetal lung volume
    status_note: READY TO SUBMIT
    synonyms:
      - Abnormal fetal FLV
    definition: |-
      An abnormal fetal lung volume is defined as sonographic and/or fetal MRI evidence that total fetal lung volume is outside the expected range for gestational age, including either decreased lung volume (pulmonary hypoplasia) or increased lung volume (pulmonary enlargement) as determined by specific biometric measurements or other validated imaging criteria.
    pmids: []
    parent: Abnormal fetal pulmonary morphology - HP:0034243
    disease_associations: []
    nano_attribution: https://orcid.org/0000-0002-5177-8109
    notes: |-
      Child terms: Enlarged fetal lungs (HP:6000613); Decreased fetal lung volume (separate HPO term).
  - id: P007
    preferred_label: Decreased fetal lung volume
    status_note: READY TO SUBMIT
    synonyms:
      - Decreased fetal FLV
    definition: |-
      A decreased fetal lung volume is defined as a value below the 5th percentile for gestational age or estimated fetal weight, or greater than or equal to 2 standard deviations below the mean, as measured by three-dimensional (3D) ultrasound or fetal MRI methods, and may be observed across a range of fetal conditions associated with pulmonary hypoplasia, including those that restrict thoracic capacity (e.g. skeletal dysplasias), cause intrathoracic mass effect (e.g. congenital diaphragmatic hernia), reduce amniotic fluid (e.g. Potter sequence or renal dysfunction), impair fetal breathing, or disrupt primary lung development. On ultrasound, fetal lung volume is typically assessed using 3D techniques--either a multiplanar summation-of-areas approach or the rotational VOCAL method--where each lung is measured separately by tracing boundaries across sequential slices, excluding mediastinal structures. When ultrasound assessment is equivocal, fetal MRI may be used to improve prognostication, with lung volume calculated from sequential single-shot fast spin-echo (SSFSE) T2-weighted images in the coronal plane by outlining the lungs across contiguous slices to generate total volume.
    pmids:
      - PMID:25102973
      - PMID:10419608
      - PMID:8765272
      - PMID:20582919
      - PMID:15459321
    parent: Abnormal fetal lung volume
    disease_associations:
