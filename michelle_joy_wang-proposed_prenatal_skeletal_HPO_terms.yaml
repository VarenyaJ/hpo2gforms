  - id: P013
    preferred_label: Abnormal fetal cardiac circumference: thoracic circumference ratio
    status_note: READY TO SUBMIT
    synonyms:
      - Abnormal fetal cardiothoracic ratio
      - increased fetal C/T ratio
    definition: |-
      An abnormal (increased) fetal cardiothoracic (C/T) ratio is defined as a C/T circumference ratio greater than or equal to 0.50. The C/T ratio is measured on ultrasound using a transverse image of the fetal chest at the level of the four-chamber view during diastole, by assessing cardiac size relative to the thorax, which should appear symmetric and near-circular with the spine at approximately 6 or 12 o'clock and the heart occupying about one-third of the thoracic area.
    pmids:
      - PMID:34647342
    parent: Abnormal fetal morphology
    disease_associations:
      - Ebstein anomaly - OMIM:224700
      - Short-rib thoracic dysplasia - OMIM:208500
      - Thanatophoric dysplasia - OMIM:187600, OMIM:187601
      - Osteogenesis imperfecta type II - OMIM:166210
      - Congenital diaphragmatic hernia - OMIM:142340
      - Cardiac rhabdomyoma - OMIM:191100
      - Tuberous sclerosis complex - OMIM:191100, OMIM:613254
